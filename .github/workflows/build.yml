name: Build webOS IPK

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build-desktop:
    name: Desktop Build (x86_64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake pkg-config \
            libsdl2-dev libsdl2-image-dev libsdl2-ttf-dev \
            libcurl4-openssl-dev libgl-dev

      - name: Build
        run: |
          mkdir build && cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release
          make -j$(nproc)

      - name: Upload desktop binary
        uses: actions/upload-artifact@v4
        with:
          name: plex-webos-desktop-x86_64
          path: build/plex-webos

  build-webos-armhf:
    name: webOS ARM Build (armhf)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU for ARM emulation
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm

      - name: Build ARM32 binary in Docker
        run: |
          docker run --rm --platform linux/arm/v7 \
            -v "${{ github.workspace }}:/src" \
            -w /src \
            ubuntu:jammy bash -c '
              set -e
              apt-get update
              apt-get install -y \
                g++-11 gcc-11 cmake pkg-config patchelf \
                libsdl2-dev libsdl2-image-dev libsdl2-ttf-dev \
                libcurl4-openssl-dev libgles2-mesa-dev

              # Use GCC 11 to match TV GLIBCXX (max 3.4.29)
              update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-11 100
              update-alternatives --install /usr/bin/g++ g++ /usr/bin/g++-11 100
              update-alternatives --install /usr/bin/cc cc /usr/bin/gcc-11 100
              update-alternatives --install /usr/bin/c++ c++ /usr/bin/g++-11 100

              # Create stub libs for linking (real libs are on the TV)
              echo "void __starfish_stub(void){}" > /tmp/stub.c
              gcc -shared -o /usr/lib/libplayerAPIs.so /tmp/stub.c

              mkdir -p build-webos && cd build-webos
              cmake .. -DCMAKE_BUILD_TYPE=Release -DWEBOS_BUILD=ON \
                -DCMAKE_C_COMPILER=gcc-11 -DCMAKE_CXX_COMPILER=g++-11
              make -j$(nproc)

              # Patch binary for webOS TV compatibility:
              # TV has /lib/ld-linux.so.3, not /lib/ld-linux-armhf.so.3
              patchelf --set-interpreter /lib/ld-linux.so.3 plex-webos
              patchelf --replace-needed ld-linux-armhf.so.3 ld-linux.so.3 plex-webos || true
            '

      - name: Install ares-cli
        run: sudo npm install -g @webos-tools/cli

      - name: Package IPK
        run: |
          mkdir -p dist
          cp build-webos/plex-webos dist/
          cp webos/appinfo.json dist/
          
          if [ ! -f webos/icon.png ]; then
            sudo apt-get install -y imagemagick
            convert -size 80x80 xc:'#E5A00D' \
              -gravity center -pointsize 36 -fill '#111' \
              -annotate 0 'P' dist/icon.png
          else
            cp webos/icon.png dist/
          fi
          
          ares-package dist/
          ls -la *.ipk

      - name: Upload IPK artifact
        uses: actions/upload-artifact@v4
        with:
          name: plex-webos-ipk-armhf
          path: '*.ipk'

      - name: Upload ARM32 binary
        uses: actions/upload-artifact@v4
        with:
          name: plex-webos-armhf
          path: build-webos/plex-webos

  build-webos-arm64:
    name: webOS ARM Build (aarch64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU for ARM64 emulation
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Build ARM64 binary in Docker
        run: |
          docker run --rm --platform linux/arm64 \
            -v "${{ github.workspace }}:/src" \
            -w /src \
            ubuntu:jammy bash -c '
              set -e
              apt-get update
              apt-get install -y \
                g++-11 gcc-11 cmake pkg-config patchelf \
                libsdl2-dev libsdl2-image-dev libsdl2-ttf-dev \
                libcurl4-openssl-dev libgles2-mesa-dev

              # Use GCC 11 to match TV GLIBCXX (max 3.4.29)
              update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-11 100
              update-alternatives --install /usr/bin/g++ g++ /usr/bin/g++-11 100

              # Create stub libs for linking (real libs are on the TV)
              echo "void __starfish_stub(void){}" > /tmp/stub.c
              gcc -shared -o /usr/lib/libplayerAPIs.so /tmp/stub.c

              mkdir -p build-webos && cd build-webos
              cmake .. -DCMAKE_BUILD_TYPE=Release -DWEBOS_BUILD=ON \
                -DCMAKE_C_COMPILER=gcc-11 -DCMAKE_CXX_COMPILER=g++-11
              make -j$(nproc)

              # Patch interpreter for webOS TV compatibility
              patchelf --set-interpreter /lib/ld-linux-aarch64.so.1 plex-webos || true
            '

      - name: Install ares-cli
        run: sudo npm install -g @webos-tools/cli

      - name: Package IPK
        run: |
          mkdir -p dist
          cp build-webos/plex-webos dist/
          cp webos/appinfo.json dist/
          
          if [ ! -f webos/icon.png ]; then
            sudo apt-get install -y imagemagick
            convert -size 80x80 xc:'#E5A00D' \
              -gravity center -pointsize 36 -fill '#111' \
              -annotate 0 'P' dist/icon.png
          else
            cp webos/icon.png dist/
          fi
          
          ares-package dist/
          ls -la *.ipk

      - name: Upload IPK artifact
        uses: actions/upload-artifact@v4
        with:
          name: plex-webos-ipk-arm64
          path: '*.ipk'

      - name: Upload ARM64 binary
        uses: actions/upload-artifact@v4
        with:
          name: plex-webos-arm64
          path: build-webos/plex-webos

  release:
    name: Create Release
    needs: [build-desktop, build-webos-armhf, build-webos-arm64]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            plex-webos-ipk-armhf/*.ipk
            plex-webos-ipk-arm64/*.ipk
            plex-webos-desktop-x86_64/plex-webos
            plex-webos-armhf/plex-webos
            plex-webos-arm64/plex-webos
          generate_release_notes: true
